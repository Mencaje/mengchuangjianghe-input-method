<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>萌创匠盒输入法</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Noto Sans SC", "PingFang SC", sans-serif;
      background: #0f111a;
      color: #e2e8f0;
      margin: 0;
      padding: 3rem 2rem;
      line-height: 1.7;
    }
    .wrap { max-width: 56rem; margin: 0 auto; }
    .brand {
      font-size: 2.5rem;
      font-weight: 700;
      color: #7dd3fc;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }
    h2 {
      font-size: 1.15rem;
      color: #cbd5e1;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    p, ul { color: #94a3b8; margin: 0 0 1rem; }
    ul { padding-left: 1.4rem; }
    li { margin-bottom: 0.5rem; }
    .badge {
      display: inline-block;
      background: rgba(125, 211, 252, 0.2);
      color: #7dd3fc;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-right: 0.4rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="brand">萌创匠盒输入法</h1>
    <p class="tagline">好用、顺手的安卓中文输入法</p>

    <h2>为什么选萌创匠盒</h2>
    <ul>
      <li><span class="badge">26 键 / 九宫格</span> 两种键盘随意切换，九宫格支持 T9 单字与词组，输入更顺手</li>
      <li><span class="badge">首字母联想</span> 敲几个首字母就能出词，比如 nh 出「你好」，输入更快</li>
      <li><span class="badge">智能联想</span> 选字后自动联想下一词，减少重复输入，聊天更流畅</li>
      <li><span class="badge">多种键盘</span> 支持 26 键、九宫格、手写、笔画，按你的习惯来选</li>
    </ul>

    <h2>简单好用</h2>
    <p>萌创匠盒输入法专注把输入做好：界面干净、操作简单，装好就能用，不打扰、不臃肿。</p>
  </div>
</body>
</html>
